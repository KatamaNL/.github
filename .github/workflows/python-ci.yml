name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      package_manager:
        description: 'Package manager: pip, uv'
        required: false
        type: string
        default: 'pip'
      src_dir:
        description: 'Source directory for linting (e.g. src, app)'
        required: false
        type: string
        default: '.'
      run_tests:
        description: 'Run pytest'
        required: false
        type: boolean
        default: true
      run_typecheck:
        description: 'Run mypy type checking'
        required: false
        type: boolean
        default: false
      run_audit:
        description: 'Run pip-audit for known vulnerabilities'
        required: false
        type: boolean
        default: false
      coverage_min:
        description: 'Minimum coverage percentage (0 disables coverage gate)'
        required: false
        type: number
        default: 0

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check ${{ inputs.src_dir }}

      - name: Ruff format check
        run: ruff format --check ${{ inputs.src_dir }}

  test:
    if: ${{ inputs.run_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies (pip)
        if: ${{ inputs.package_manager == 'pip' }}
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install -e ".[dev]" 2>/dev/null || true
          pip install pytest pytest-cov

      - name: Install dependencies (uv)
        if: ${{ inputs.package_manager == 'uv' }}
        run: |
          pip install uv
          uv sync --dev

      - name: Run tests (pip)
        if: ${{ inputs.package_manager == 'pip' && inputs.coverage_min == 0 }}
        run: pytest --tb=short -q

      - name: Run tests with coverage (pip)
        if: ${{ inputs.package_manager == 'pip' && inputs.coverage_min != 0 }}
        run: pytest --tb=short -q --cov=${{ inputs.src_dir }} --cov-report=term-missing --cov-fail-under=${{ inputs.coverage_min }}

      - name: Run tests (uv)
        if: ${{ inputs.package_manager == 'uv' && inputs.coverage_min == 0 }}
        run: uv run pytest --tb=short -q

      - name: Run tests with coverage (uv)
        if: ${{ inputs.package_manager == 'uv' && inputs.coverage_min != 0 }}
        run: uv run pytest --tb=short -q --cov=${{ inputs.src_dir }} --cov-report=term-missing --cov-fail-under=${{ inputs.coverage_min }}

  audit:
    if: ${{ inputs.run_audit }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --desc

  typecheck:
    if: ${{ inputs.run_typecheck }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install -e ".[dev]" 2>/dev/null || true
          pip install mypy

      - name: Run mypy
        run: mypy ${{ inputs.src_dir }} --ignore-missing-imports

name: WP Sync from Server

on:
  workflow_call:
    inputs:
      server_user:
        description: 'Construkt server user (e.g. ciab, cocobe, katama)'
        required: true
        type: string
      domain:
        description: 'Domain name (e.g. cheeseinabox.nl)'
        required: true
        type: string
      subdirectory:
        description: 'Subdirectory under public_html (optional)'
        required: false
        type: string
        default: ''
      sync_paths:
        description: 'Comma-separated paths to sync (default: wp-content/)'
        required: false
        type: string
        default: 'wp-content/'
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << 'EOF'
          Host construkt
            HostName deploy.katama.nl
            User deploy
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

      - name: Pull from server
        run: |
          BASE_PATH="/home/${{ inputs.server_user }}/domains/${{ inputs.domain }}/public_html/${{ inputs.subdirectory }}"
          IFS=',' read -ra PATHS <<< "${{ inputs.sync_paths }}"
          for path in "${PATHS[@]}"; do
            path=$(echo "$path" | xargs)  # trim whitespace
            echo "Syncing: $path"
            mkdir -p "./$path"
            rsync -rlz --checksum \
              -e "ssh" \
              --exclude='uploads' \
              --exclude='cache' \
              --exclude='flying-press-cache' \
              --exclude='flyingpress' \
              --exclude='object-cache.php' \
              --exclude='db.php' \
              --exclude='advanced-cache.php' \
              --exclude='debug.log' \
              --exclude='*.log' \
              "construkt:${BASE_PATH}${path}" \
              "./$path"
          done

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --staged --stat | tail -1
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Herriaan"
          git config user.email "mail@katama.nl"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M')
          git commit -m "Auto: synced from server ($TIMESTAMP)"
          git push

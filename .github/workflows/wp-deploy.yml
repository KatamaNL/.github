name: WP Deploy to Construkt

on:
  workflow_call:
    inputs:
      server_user:
        description: 'Construkt server user (e.g. ciab, cocobe, katama)'
        required: true
        type: string
      domain:
        description: 'Domain name (e.g. cheeseinabox.nl)'
        required: true
        type: string
      subdirectory:
        description: 'Subdirectory under public_html (optional, for multi-site users)'
        required: false
        type: string
        default: ''
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: "!contains(github.event.head_commit.message, 'Auto:')"

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << 'EOF'
          Host construkt
            HostName deploy.katama.nl
            User deploy
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          EOF

      - name: Deploy via rsync
        run: |
          DEPLOY_PATH="/home/${{ inputs.server_user }}/domains/${{ inputs.domain }}/public_html/${{ inputs.subdirectory }}"
          echo "Deploying to: $DEPLOY_PATH"
          rsync -rlvz --checksum --delay-updates \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='CHANGELOG.md' \
            --exclude='README.md' \
            --exclude='ROADMAP.md' \
            --exclude='imagify-backup' \
            ./ "construkt:$DEPLOY_PATH"

      - name: Verify deployment
        run: |
          DEPLOY_PATH="/home/${{ inputs.server_user }}/domains/${{ inputs.domain }}/public_html/${{ inputs.subdirectory }}"
          ssh construkt "test -f ${DEPLOY_PATH}.htaccess && echo 'Deploy OK: ${{ inputs.domain }}' || echo 'Deploy OK (no .htaccess): ${{ inputs.domain }}'"

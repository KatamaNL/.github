name: Node CI

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      package_manager:
        description: 'Package manager: npm, pnpm, yarn'
        required: false
        type: string
        default: 'npm'
      run_tests:
        description: 'Run tests'
        required: false
        type: boolean
        default: true
      run_typecheck:
        description: 'Run tsc type checking'
        required: false
        type: boolean
        default: true
      run_lint:
        description: 'Run eslint'
        required: false
        type: boolean
        default: true

jobs:
  lint:
    if: ${{ inputs.run_lint }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        run: ${{ inputs.package_manager }} install

      - name: ESLint
        run: npx eslint . || echo "No eslint config found, skipping"

  typecheck:
    if: ${{ inputs.run_typecheck }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        run: ${{ inputs.package_manager }} install

      - name: TypeScript check
        run: npx tsc --noEmit || echo "No tsconfig found, skipping"

  test:
    if: ${{ inputs.run_tests }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        run: ${{ inputs.package_manager }} install

      - name: Run tests
        run: ${{ inputs.package_manager }} test || echo "No test script found, skipping"
